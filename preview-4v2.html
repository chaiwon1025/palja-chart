<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8e4dc; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px; font-family: 'Noto Sans KR', sans-serif; }
.wrap { width: 520px; }
.title-tag { text-align: center; font-weight: 700; font-size: 20px; color: #333; margin-bottom: 8px; }
.title-sub { text-align: center; color: #999; font-size: 13px; margin-bottom: 28px; }

.card {
  background: #fff;
  padding: 56px 44px 48px;
  position: relative;
}

/* 상단 얇은 라인 */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: #111;
}

/* 헤더 */
.masthead {
  text-align: center;
  padding-bottom: 20px;
  margin-bottom: 28px;
  border-bottom: 1px solid #e0e0e0;
}
.masthead h2 {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  font-weight: 700;
  color: #111;
  letter-spacing: 12px;
  margin-bottom: 8px;
}
.masthead .dateline {
  font-size: 11px;
  color: #aaa;
  letter-spacing: 1.5px;
  font-weight: 300;
}

/* 헤드라인 */
.headline {
  font-family: 'Noto Serif KR', serif;
  font-size: 24px;
  font-weight: 900;
  color: #111;
  text-align: center;
  line-height: 1.55;
  margin-bottom: 32px;
  letter-spacing: -0.5px;
}

/* 일주 섹션 */
.pillar-section {
  display: flex;
  gap: 28px;
  align-items: center;
  margin-bottom: 36px;
  padding: 28px 32px;
  background: #fafafa;
  border-left: 3px solid #111;
}
.pillar {
  font-family: 'Noto Serif KR', serif;
  font-size: 52px;
  font-weight: 900;
  color: #111;
  line-height: 1;
  letter-spacing: 2px;
}
.pillar-desc { flex: 1; }
.archetype-label {
  font-size: 12px;
  color: #111;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #e0e0e0;
}
.archetype-label span {
  color: #c0392b;
}
.summary {
  font-family: 'Noto Serif KR', serif;
  font-size: 13.5px;
  color: #555;
  line-height: 1.85;
}

/* 지표 섹션 */
.section-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.section-divider::before,
.section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #ddd;
}
.section-divider span {
  font-size: 10px;
  font-weight: 700;
  color: #999;
  letter-spacing: 3px;
  white-space: nowrap;
}

/* 지표 아이템 */
.metric {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 0;
  border-bottom: 1px solid #f0f0f0;
}
.metric:last-child { border-bottom: none; }

.metric-left { flex: 1; }
.metric-name {
  font-size: 15px;
  color: #111;
  font-weight: 700;
  margin-bottom: 4px;
}
.metric-detail {
  font-size: 11.5px;
  color: #aaa;
  font-weight: 400;
}

.metric-right {
  text-align: right;
  min-width: 72px;
}
.metric-val {
  font-family: 'Noto Serif KR', serif;
  font-size: 32px;
  font-weight: 900;
  color: #111;
  line-height: 1;
}
.metric-rank {
  font-size: 10.5px;
  color: #999;
  margin-top: 4px;
  font-weight: 400;
}

/* 바 */
.metric-bar-wrap {
  margin-top: 8px;
  width: 100%;
  height: 3px;
  background: #f0f0f0;
  border-radius: 2px;
}
.metric-bar-fill {
  height: 100%;
  background: #111;
  border-radius: 2px;
  transition: width 0.3s;
}

/* 하단 */
.footer {
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid #e0e0e0;
  text-align: center;
}
.footer p {
  font-size: 10px;
  color: #bbb;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="title-tag">4. 신문 / 리포트 (v2)</div>
  <div class="title-sub">세련되고 권위있는 분석 리포트</div>

  <div class="card">
    <div class="masthead">
      <h2>팔 자 차 트</h2>
      <div class="dateline">INVESTMENT PERSONALITY REPORT · 2025</div>
    </div>

    <div class="headline">
      「갑자」일주 소유자,<br>투자 전선에 뛰어들다
    </div>

    <div class="pillar-section">
      <div class="pillar">갑자</div>
      <div class="pillar-desc">
        <div class="archetype-label"><span>■</span> 선구적 개척자</div>
        <div class="summary">
          새로운 시장에 누구보다 먼저 뛰어드는 선구자. 남들이 망설일 때 이미 매수 버튼을 누르고 있다.
        </div>
      </div>
    </div>

    <div class="section-divider"><span>투자 성향 지표</span></div>

    <div class="metric">
      <div class="metric-left">
        <div class="metric-name">FOMO 반응도</div>
        <div class="metric-detail">급등주 반응 속도</div>
        <div class="metric-bar-wrap"><div class="metric-bar-fill" style="width:72%"></div></div>
      </div>
      <div class="metric-right">
        <div class="metric-val">72</div>
        <div class="metric-rank">상위 28%</div>
      </div>
    </div>

    <div class="metric">
      <div class="metric-left">
        <div class="metric-name">장기투자 체력</div>
        <div class="metric-detail">존버 지속력</div>
        <div class="metric-bar-wrap"><div class="metric-bar-fill" style="width:45%"></div></div>
      </div>
      <div class="metric-right">
        <div class="metric-val">45</div>
        <div class="metric-rank">하위 55%</div>
      </div>
    </div>

    <div class="metric">
      <div class="metric-left">
        <div class="metric-name">레버리지 유혹도</div>
        <div class="metric-detail">빚투 확률</div>
        <div class="metric-bar-wrap"><div class="metric-bar-fill" style="width:88%"></div></div>
      </div>
      <div class="metric-right">
        <div class="metric-val">88</div>
        <div class="metric-rank">상위 12%</div>
      </div>
    </div>

    <div class="footer">
      <p>PALJA CHART · ALL RIGHTS RESERVED</p>
    </div>
  </div>
</div>
</body>
</html>
