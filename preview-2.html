<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e5e5e5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px; font-family: 'Noto Sans KR', sans-serif; }
.wrap { width: 480px; }
.minimal {
  background: #ffffff; border-radius: 20px; padding: 48px 36px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.header { margin-bottom: 40px; }
.header h2 { font-size: 34px; font-weight: 900; color: #111; margin-bottom: 4px; }
.header p { font-size: 14px; color: #999; }
.pillar-box { background: #f8f8f8; border-radius: 16px; padding: 32px; text-align: center; margin-bottom: 28px; }
.pillar-label { font-size: 12px; color: #bbb; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }
.pillar { font-size: 68px; font-weight: 900; color: #111; line-height: 1.1; }
.archetype-badge { display: inline-block; margin-top: 14px; background: #111; color: #fff; font-size: 12px; font-weight: 700; padding: 5px 16px; border-radius: 24px; }
.summary { font-size: 15px; color: #666; line-height: 1.8; margin-bottom: 32px; padding-left: 20px; border-left: 3px solid #111; }
.metric { display: flex; align-items: center; gap: 18px; padding: 18px 0; border-bottom: 1px solid #f0f0f0; }
.metric:last-child { border-bottom: none; }
.metric-emoji { font-size: 24px; }
.metric-info { flex: 1; }
.metric-name { font-size: 14px; font-weight: 700; color: #111; }
.metric-sub { font-size: 12px; color: #bbb; margin-top: 3px; }
.metric-bar { height: 5px; background: #f0f0f0; border-radius: 3px; margin-top: 10px; }
.metric-bar-fill { height: 100%; background: #111; border-radius: 3px; }
.metric-val { font-size: 28px; font-weight: 900; color: #111; }
.title-tag { text-align: center; font-weight: 700; font-size: 22px; color: #333; margin-bottom: 10px; }
.title-sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title-tag">2. 미니멀 모던</div>
  <div class="title-sub">깔끔하고 현대적인 앱 느낌</div>
  <div class="minimal">
    <div class="header">
      <h2>팔자차트</h2>
      <p>투자 성향 분석 리포트</p>
    </div>
    <div class="pillar-box">
      <div class="pillar-label">YOUR DAY PILLAR</div>
      <div class="pillar">갑자</div>
      <span class="archetype-badge">선구적 개척자</span>
    </div>
    <div class="summary">
      새로운 시장에 누구보다 먼저 뛰어드는 선구자. 남들이 망설일 때 이미 매수 버튼을 누르고 있다.
    </div>
    <div class="metric">
      <span class="metric-emoji">🔥</span>
      <div class="metric-info">
        <div class="metric-name">FOMO 반응도</div>
        <div class="metric-sub">급등주 보면 참을 수 있는가</div>
        <div class="metric-bar"><div class="metric-bar-fill" style="width:72%"></div></div>
      </div>
      <span class="metric-val">72</span>
    </div>
    <div class="metric">
      <span class="metric-emoji">🏋️</span>
      <div class="metric-info">
        <div class="metric-name">장기투자 체력</div>
        <div class="metric-sub">존버는 승리한다... 과연?</div>
        <div class="metric-bar"><div class="metric-bar-fill" style="width:45%"></div></div>
      </div>
      <span class="metric-val">45</span>
    </div>
    <div class="metric">
      <span class="metric-emoji">⚡</span>
      <div class="metric-info">
        <div class="metric-name">레버리지 유혹도</div>
        <div class="metric-sub">빚투의 늪에 빠질 확률</div>
        <div class="metric-bar"><div class="metric-bar-fill" style="width:88%"></div></div>
      </div>
      <span class="metric-val">88</span>
    </div>
  </div>
</div>
</body>
</html>
