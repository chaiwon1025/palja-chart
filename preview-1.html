<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #e8e0d3; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px; }
.hanji {
  background: #f7f3ec; border-radius: 4px; padding: 48px 36px; border: 1px solid #d4c9b5;
  position: relative; width: 480px; box-shadow: 2px 2px 12px rgba(0,0,0,0.06);
}
.hanji::before { content: ''; position: absolute; inset: 10px; border: 1px solid #c9b896; pointer-events: none; }
.header { text-align: center; margin-bottom: 36px; }
.header h2 { font-family: 'Gowun Batang', serif; font-size: 40px; font-weight: 700; color: #2c2418; letter-spacing: 10px; margin-bottom: 8px; }
.header p { font-size: 13px; color: #8a7a64; letter-spacing: 5px; }
.divider { width: 50px; height: 1px; background: #2c2418; margin: 0 auto 36px; }
.pillar-box { text-align: center; margin-bottom: 32px; padding: 36px 0; border-top: 1px solid #d4c9b5; border-bottom: 1px solid #d4c9b5; }
.pillar-label { font-size: 12px; color: #8a7a64; letter-spacing: 8px; margin-bottom: 14px; }
.pillar { font-family: 'Gowun Batang', serif; font-size: 80px; font-weight: 700; color: #2c2418; line-height: 1; }
.archetype { display: inline-block; margin-top: 18px; font-size: 15px; color: #c0392b; border: 2px solid #c0392b; padding: 5px 20px; transform: rotate(-3deg); letter-spacing: 3px; }
.summary { font-family: 'Gowun Batang', serif; font-size: 16px; color: #4a3f32; line-height: 1.9; text-align: center; margin-bottom: 32px; padding: 0 16px; }
.metric { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px dashed #d4c9b5; }
.metric:last-child { border-bottom: none; }
.metric-name { font-size: 15px; color: #2c2418; }
.metric-bar { width: 160px; height: 8px; background: #e8e0d3; position: relative; }
.metric-bar-fill { position: absolute; left: 0; top: 0; height: 100%; background: #2c2418; }
.metric-val { font-size: 16px; font-weight: 700; color: #2c2418; width: 36px; text-align: right; }
.title-tag { text-align: center; font-weight: 700; font-size: 22px; color: #2c2418; margin-bottom: 20px; font-family: 'Gowun Batang', serif; }
.title-sub { text-align: center; color: #8a7a64; font-size: 13px; margin-bottom: 24px; }
</style>
</head>
<body>
<div>
  <div class="title-tag">1. 한지/동양풍</div>
  <div class="title-sub">전통적이면서 세련된 사주 느낌</div>
  <div class="hanji">
    <div class="header">
      <h2>팔 자 차 트</h2>
      <p>투자성향분석</p>
    </div>
    <div class="divider"></div>
    <div class="pillar-box">
      <div class="pillar-label">당 신 의 일 주</div>
      <div class="pillar">갑자</div>
      <div><span class="archetype">선구적 개척자</span></div>
    </div>
    <div class="summary">
      새로운 시장에 누구보다 먼저 뛰어드는 선구자.<br>
      남들이 망설일 때 이미 매수 버튼을 누르고 있다.
    </div>
    <div class="metric">
      <span class="metric-name">FOMO 반응도</span>
      <div class="metric-bar"><div class="metric-bar-fill" style="width:72%"></div></div>
      <span class="metric-val">72</span>
    </div>
    <div class="metric">
      <span class="metric-name">장기투자 체력</span>
      <div class="metric-bar"><div class="metric-bar-fill" style="width:45%"></div></div>
      <span class="metric-val">45</span>
    </div>
    <div class="metric">
      <span class="metric-name">레버리지 유혹도</span>
      <div class="metric-bar"><div class="metric-bar-fill" style="width:88%"></div></div>
      <span class="metric-val">88</span>
    </div>
  </div>
</div>
</body>
</html>
